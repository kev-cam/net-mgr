# net-mgr web UI — Apache 2.4 snippet.
#
# This is the *bootstrap* version (auth bypass = 192.168/16) installed
# fresh.  Once interface_zones is populated, regenerate it with
#   net-gen-apache-conf --reload
# so the bypass list reflects only Private-class CIDRs and the rest
# (DMZ, Internet, Dummy, …) needs basic-auth credentials.
#
# Install to /etc/apache2/conf-available/net-mgr.conf and enable with:
#   a2enmod cgid
#   a2enconf net-mgr
#   systemctl restart apache2     # restart not reload — cgid needs a full start
#
# Access at http://<host>/net-mgr
#
# To enable the basic-auth path, create the password file:
#   htpasswd -c /etc/net-mgr/htpasswd <user>
# If the file doesn't exist, basic-auth fails closed.

ScriptAlias /net-mgr /usr/lib/cgi-bin/net-mgr-web.cgi

<Files "net-mgr-web.cgi">
    SetHandler cgi-script
    Options +ExecCGI
</Files>

<Location /net-mgr>
    AuthType Basic
    AuthName "net-mgr"
    AuthUserFile /etc/net-mgr/htpasswd
    AuthBasicProvider file

    <RequireAny>
        Require ip 192.168.0.0/16
        Require ip 127.0.0.1
        Require ip ::1
        Require valid-user
    </RequireAny>
</Location>
