# net-mgr web UI — Apache 2.4 snippet.
#
# Install to /etc/apache2/conf-available/net-mgr.conf and enable with:
#   a2enmod cgid
#   a2enconf net-mgr
#   systemctl restart apache2     # restart not reload — cgid needs a full start
#
# Access at http://<host>/net-mgr
#
# Authorisation policy: LAN clients (192.168/16) are allowed
# unauthenticated; anyone else needs basic-auth credentials. To enable
# the auth path, create the password file:
#   htpasswd -c /etc/net-mgr/htpasswd <user>
# If the file doesn't exist, basic-auth fails closed and only LAN
# clients get through — fine for kc-qernel; nas3 needs the file.

ScriptAlias /net-mgr /usr/lib/cgi-bin/net-mgr-web.cgi

<Files "net-mgr-web.cgi">
    SetHandler cgi-script
    Options +ExecCGI
</Files>

<Location /net-mgr>
    AuthType Basic
    AuthName "net-mgr"
    AuthUserFile /etc/net-mgr/htpasswd
    AuthBasicProvider file

    <RequireAny>
        Require ip 192.168.0.0/16
        Require ip 127.0.0.1
        Require ip ::1
        Require valid-user
    </RequireAny>
</Location>
